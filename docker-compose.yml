services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: alshival:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  worker:
    image: alshival:latest
    depends_on:
      - web
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_resource_health_worker", "--interval-seconds", "300", "--users-per-worker", "10", "--max-workers", "16"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  global-key-worker:
    image: alshival:latest
    depends_on:
      - web
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_global_api_key_worker", "--interval-seconds", "3600"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  user-key-worker:
    image: alshival:latest
    depends_on:
      - web
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
    command: ["python", "manage.py", "run_user_api_key_worker", "--interval-seconds", "10800"]
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  mcp:
    image: alshival:latest
    depends_on:
      - web
      - github-mcp
    env_file:
      - .env
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      SQLITE_PATH: "/app/var/db.sqlite3"
      USER_DATA_ROOT: "/app/var/user_data"
      STATIC_ROOT: "/app/var/staticfiles"
      RUN_MIGRATE: "0"
      RUN_COLLECTSTATIC: "0"
      MCP_API_KEY_HEADER: "x-api-key"
      MCP_GITHUB_UPSTREAM_URL: "http://github-mcp:8082/"
    command: ["uvicorn", "mcp.app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./var:/app/var
    restart: unless-stopped
  github-mcp:
    build:
      context: ./github-mcp
      dockerfile: Dockerfile
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN:-}"
    command: ["http"]
    restart: unless-stopped
